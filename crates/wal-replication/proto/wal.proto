syntax = "proto3";

package wal;

// ── Raft consensus RPCs ────────────────────────────────────────────────────
//
// Implements the two core Raft RPCs from the original paper (Ongaro & Ousterhout, 2014).

service RaftService {
    rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse);
    rpc RequestVote   (RequestVoteRequest)   returns (RequestVoteResponse);
}

// A single entry in the replicated log.
message LogEntry {
    uint64 term  = 1;
    uint64 index = 2;
    bytes  data  = 3;
}

// Sent by the leader to replicate log entries and to serve as a heartbeat.
message AppendEntriesRequest {
    uint64            term           = 1;
    string            leader_id      = 2;
    uint64            prev_log_index = 3;
    uint64            prev_log_term  = 4;
    repeated LogEntry entries        = 5;
    uint64            leader_commit  = 6;
}

message AppendEntriesResponse {
    uint64 term           = 1;
    bool   success        = 2;
    // Fast log-backtracking hint (Ongaro §5.3)
    uint64 conflict_index = 3;
    uint64 conflict_term  = 4;
}

// Sent by a candidate to gather votes during an election.
message RequestVoteRequest {
    uint64 term           = 1;
    string candidate_id   = 2;
    uint64 last_log_index = 3;
    uint64 last_log_term  = 4;
}

message RequestVoteResponse {
    uint64 term         = 1;
    bool   vote_granted = 2;
}

// ── Client-facing write / read API ─────────────────────────────────────────

service WalService {
    rpc Write    (WriteRequest)    returns (WriteResponse);
    rpc ReadFrom (ReadFromRequest) returns (ReadFromResponse);
}

message WriteRequest  { bytes data = 1; }
message WriteResponse {
    bool   success     = 1;
    uint64 index       = 2;
    string leader_hint = 3;  // non-empty when this node is not the leader
}

message ReadFromRequest  { uint64 from_index = 1; }
message ReadFromResponse { repeated LogEntry entries = 1; }
